<body>

<!-- ====== MAIN LIST VIEW ====== -->
<div class="view active" id="viewList">
  <div class="app">
    <div class="header">
      <h1>Home Tasks</h1>
      <div class="stat-pill" id="taskCount"></div>
      <div class="mini-cals" id="miniCals"></div>
    </div>

    <div id="weekendSection"></div>
    <div class="section-label" id="allLabel" style="display:none">All Tasks <span></span></div>
    <div class="task-list" id="taskList"></div>
  </div>
  <button class="fab" id="fabAdd" aria-label="Add task">+</button>
</div>

<!-- ====== DETAIL VIEW ====== -->
<div class="view" id="viewDetail">
  <div class="detail-view">
    <div class="detail-nav" id="detailNav"></div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- ====== ADD/EDIT FORM ====== -->
<div class="view" id="viewForm">
  <div class="form-view">
    <div class="detail-nav">
      <button class="back-btn" id="formBackBtn" type="button">&larr; Cancel</button>
      <div id="formTitle" class="form-title">New Task</div>
      <div style="width:70px"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="fTitle">Task Name</label>
      <input class="form-input" id="fTitle" placeholder="What needs doing?" autocomplete="off">
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="fCatGrid" role="group" aria-label="Category"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Priority</label>
      <div class="priority-options" id="priOptions" role="group" aria-label="Priority">
        <button class="pri-option low" data-p="low" type="button">Low</button>
        <button class="pri-option med" data-p="med" type="button">Med</button>
        <button class="pri-option high" data-p="high" type="button">High</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Weekend</label>
      <div class="cat-grid" id="fWeekendGrid" role="group" aria-label="Weekend"></div>
    </div>

    <!-- Subtasks (edit mode only) -->
    <div class="form-group" id="fSubtasksGroup" style="display:none">
      <label class="form-label">Steps</label>
      <div id="fSubtaskList"></div>
      <div class="add-subtask-row">
        <input id="fSubInput" placeholder="Add a step&hellip;">
        <button class="add-subtask-btn" id="formAddSubBtn" type="button">Add</button>
      </div>
    </div>

    <!-- Notes (edit mode only) -->
    <div class="form-group" id="fNotesGroup" style="display:none">
      <label class="form-label" for="fNotes">Notes</label>
      <textarea class="notes-area" id="fNotes" placeholder="Part numbers, measurements, links&hellip;"></textarea>
    </div>

    <button class="save-btn" id="saveBtn" type="button">Save Task</button>

    <!-- Delete (edit mode only) -->
    <button class="del-btn form-delete-btn" id="fDeleteBtn" style="display:none" type="button">Delete Task</button>

    <!-- Backup -->
    <div class="form-group" style="margin-top:32px">
      <label class="form-label">Data Backup</label>
      <div class="backup-row">
        <button class="backup-btn" id="exportBtn" type="button">Export Backup</button>
        <button class="backup-btn" id="importBtn" type="button">Import Backup</button>
      </div>
    </div>
  </div>
</div>

<!-- ====== DELETE CONFIRM ====== -->
<div class="overlay" id="deleteOverlay">
  <div class="dialog" role="alertdialog" aria-labelledby="deleteDialogText">
    <p id="deleteDialogText">Delete this task and all its subtasks?</p>
    <div class="dialog-actions">
      <button class="dialog-btn dialog-cancel" id="dialogCancelBtn" type="button">Cancel</button>
      <button class="dialog-btn dialog-confirm" id="dialogConfirmBtn" type="button">Delete</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
