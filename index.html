<!DOCTYPE html>
<html lang="en">
<head>

<meta name="theme-color" content="#111110">

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap">
<style>

:root {
  --bg: #121210;
  --bg2: #1a1a17;
  --surface: #1d1d1a;
  --surface-up: #272722;
  --border: #2a2a26;
  --border-light: #383832;
  --text: #e8e8e2;
  --text-mid: #9e9e94;
  --text-dim: #666660;
  --accent: #d4a843;
  --accent-dim: rgba(212, 168, 67, 0.08);
  --accent-glow: rgba(212, 168, 67, 0.15);
  --high: #e05252;
  --high-bg: rgba(224, 82, 82, 0.1);
  --med: #d4a843;
  --med-bg: rgba(212, 168, 67, 0.1);
  --low: #5a8a5e;
  --low-bg: rgba(90, 138, 94, 0.1);
  --radius: 12px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
  --font: 'Geist', -apple-system, sans-serif;
  --transition: 120ms ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overscroll-behavior: none;
}

/* ====== VIEWS ====== */
.view { display: none; }
.view.active { display: block; }

/* ====== MAIN LIST VIEW ====== */
.app {
  max-width: 540px;
  margin: 0 auto;
  padding: calc(var(--safe-top) + 8px) 16px calc(var(--safe-bottom) + 90px);
  min-height: 100dvh;
}

.header {
  padding: 12px 0 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.header h1 {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.6px;
  color: var(--text);
}
.stat-pill {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 100px;
}
.stat-pill span { color: var(--accent); }

/* Weekend Section */
.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Task Cards */
.task-list { display: flex; flex-direction: column; gap: 6px; }

.task-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 16px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.03);
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  animation: fadeUp 150ms ease backwards;
  position: relative;
}
.task-card:active { background: var(--surface-up); transform: scale(0.995); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(4px); }
}

.task-check {
  width: 24px;
  height: 24px;
  padding: 10px;
  margin: -10px;
  border: 2px solid var(--border-light);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  z-index: 2;
}
.task-check.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.task-check.checked::after {
  content: '';
  width: 7px;
  height: 4px;
  border-left: 2px solid var(--bg);
  border-bottom: 2px solid var(--bg);
  transform: rotate(-45deg) translateY(-1px);
}

.task-info { flex: 1; min-width: 0; }
.task-title {
  font-size: 15px;
  font-weight: 400;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.task-card.done .task-title {
  text-decoration: line-through;
  color: var(--text-mid);
}
.task-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 3px;
}
.task-cat-badge {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  background: var(--bg2);
  padding: 2px 8px;
  border-radius: 4px;
}
.task-subtask-count {
  font-size: 11px;
  font-family: var(--font);
  color: var(--text-dim);
}
.task-subtask-count span { color: var(--accent); }

.task-priority-bar {
  width: 3px;
  height: 24px;
  border-radius: 2px;
  flex-shrink: 0;
}
.task-priority-bar.high { background: var(--high); }
.task-priority-bar.med { background: var(--med); }
.task-priority-bar.low { background: var(--low); opacity: 0.35; }

/* Empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
.empty p { font-size: 14px; font-weight: 400; }

/* Add Button (FAB) */
.fab {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 24px);
  right: max(24px, calc((100vw - 540px) / 2 + 16px));
  width: 56px;
  height: 56px;
  background: var(--accent);
  border: none;
  border-radius: 16px;
  color: var(--bg);
  font-size: 28px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 24px var(--accent-glow);
  transition: all var(--transition);
  z-index: 20;
}
.fab:active { transform: scale(0.93); }

/* ====== DETAIL VIEW ====== */
.detail-view {
  max-width: 540px;
  margin: 0 auto;
  padding: calc(var(--safe-top) + 8px) 16px calc(var(--safe-bottom) + 30px);
  min-height: 100dvh;
}

.detail-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0 24px;
  gap: 10px;
}
.back-btn, .del-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-mid);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}
.back-btn:active { background: var(--surface-up); }
.del-btn { color: var(--high); border-color: rgba(224,82,82,0.2); }
.del-btn:active { background: var(--high-bg); }

.job-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 20px;
  line-height: 1.25;
}

.detail-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.badge {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 100px;
  border: 1px solid;
}
.badge-cat { background: var(--surface); border-color: var(--border); color: var(--text-mid); }
.badge-priority-high { background: var(--high-bg); border-color: rgba(224,82,82,0.3); color: var(--high); }
.badge-priority-med { background: var(--med-bg); border-color: rgba(212,168,67,0.3); color: var(--med); }
.badge-priority-low { background: var(--low-bg); border-color: rgba(90,138,94,0.3); color: var(--low); }
.badge-weekend { background: var(--accent-dim); border-color: rgba(212,168,67,0.3); color: var(--accent); }

.edit-btn {
  background: var(--accent-dim);
  border: 1px solid rgba(212,168,67,0.2);
  color: var(--accent);
  width: 40px;
  height: 40px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}
.edit-btn svg { width: 18px; height: 18px; }
.edit-btn:active { background: var(--accent-dim); opacity: 0.8; }

.detail-section {
  margin-bottom: 24px;
}
.detail-section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 14px;
}

/* Pristine subtask list */
.subtask-list { display: flex; flex-direction: column; }
.subtask-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: all var(--transition);
}
.subtask-item:last-child { border-bottom: none; }
.subtask-item:active { opacity: 0.7; }
.subtask-check {
  width: 26px;
  height: 26px;
  border: 2px solid var(--border-light);
  border-radius: 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.subtask-check.checked { background: var(--accent); border-color: var(--accent); }
.subtask-check.checked::after {
  content: '';
  width: 8px;
  height: 5px;
  border-left: 2px solid var(--bg);
  border-bottom: 2px solid var(--bg);
  transform: rotate(-45deg) translateY(-1px);
}
.subtask-text {
  flex: 1;
  font-size: 16px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.35;
}
.subtask-item.done .subtask-text {
  text-decoration: line-through;
  color: var(--text-mid);
}

/* Notes read-only in pristine view */
.notes-readonly {
  font-size: 14px;
  color: var(--text-mid);
  line-height: 1.6;
  white-space: pre-wrap;
}

/* Mark done button at bottom */
.mark-done-btn {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-mid);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  padding: 14px;
  border-radius: var(--radius);
  cursor: pointer;
  margin-top: 8px;
  transition: all var(--transition);
}
.mark-done-btn:active { background: var(--surface-up); }
.subtask-del {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  padding: 2px;
  opacity: 0.5;
  transition: all var(--transition);
}
.subtask-del:hover { color: var(--high); opacity: 1; }

.add-subtask-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.add-subtask-row input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  outline: none;
}
.add-subtask-row input::placeholder { color: var(--text-dim); }
.add-subtask-row input:focus { border-color: var(--accent); }
.add-subtask-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  cursor: pointer;
}

/* Notes */
.notes-area {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 14px;
  border-radius: var(--radius-sm);
  outline: none;
  resize: vertical;
  min-height: 100px;
  line-height: 1.5;
  caret-color: var(--accent);
}
.notes-area::placeholder { color: var(--text-dim); }
.notes-area:focus { border-color: var(--accent); }

/* ====== ADD/EDIT FORM VIEW ====== */
.form-view {
  max-width: 540px;
  margin: 0 auto;
  padding: calc(var(--safe-top) + 8px) 16px calc(var(--safe-bottom) + 30px);
  min-height: 100dvh;
}

.form-group { margin-bottom: 24px; }
.form-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 8px;
  display: block;
}
.form-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 500;
  padding: 14px 16px;
  border-radius: var(--radius);
  outline: none;
  transition: border-color var(--transition);
  caret-color: var(--accent);
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-dim); font-weight: 300; }

/* Category selector */
.cat-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.cat-option {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--transition);
}
.cat-option svg { display: block; }
.cat-option.selected {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* Priority selector */
.priority-options { display: flex; gap: 8px; }
.pri-option {
  flex: 1;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  text-align: center;
  transition: all var(--transition);
}
.pri-option.selected.high { background: var(--high-bg); border-color: rgba(224,82,82,0.4); color: var(--high); }
.pri-option.selected.med { background: var(--med-bg); border-color: rgba(212,168,67,0.4); color: var(--med); }
.pri-option.selected.low { background: var(--low-bg); border-color: rgba(90,138,94,0.4); color: var(--low); }

/* Weekend toggle */
.weekend-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
}
.weekend-toggle-label {
  font-size: 15px;
  font-weight: 500;
}
.toggle-switch {
  width: 44px;
  height: 26px;
  background: var(--border);
  border-radius: 13px;
  position: relative;
  transition: background var(--transition);
}
.toggle-switch.on { background: var(--accent); }
.toggle-switch::after {
  content: '';
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 3px;
  left: 3px;
  transition: transform var(--transition);
}
.toggle-switch.on::after { transform: translateX(18px); }

/* Save button */
.save-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  color: var(--bg);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 600;
  padding: 16px;
  border-radius: var(--radius);
  cursor: pointer;
  margin-top: 24px;
  transition: all var(--transition);
}
.save-btn:active { transform: scale(0.98); opacity: 0.9; }

.form-title { font-size: 16px; font-weight: 600; }
.form-delete-btn { width: 100%; text-align: center; margin-top: 12px; padding: 14px; border-radius: var(--radius); }

/* ====== CONFIRM DIALOG ====== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.show { display: flex; }
.dialog {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  max-width: 320px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  width: 100%;
  text-align: center;
}
.dialog p { font-size: 15px; margin-bottom: 20px; color: var(--text-mid); }
.dialog-actions { display: flex; gap: 10px; }
.dialog-btn {
  flex: 1;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  padding: 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all var(--transition);
}
.dialog-cancel { background: var(--surface-up); color: var(--text-mid); }
.dialog-confirm { background: var(--high-bg); border-color: rgba(224,82,82,0.3); color: var(--high); }

/* ====== STEP EDIT MODE ====== */
.step-edit-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-mid);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}
.step-edit-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}
.step-edit-btn:active { opacity: 0.8; }

.subtask-item.edit-mode {
  position: relative;
  border-bottom-color: transparent;
  border-radius: 8px;
  padding: 16px 10px;
  margin: 0 -10px;
  cursor: text;
}
.subtask-item.edit-mode::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 8px;
  padding: 1px;
  background: conic-gradient(from var(--border-angle, 0deg), transparent 0%, transparent 60%, var(--accent) 78%, transparent 96%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  animation: borderSpin 2.5s linear infinite;
  pointer-events: none;
}

@property --border-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}
@keyframes borderSpin {
  to { --border-angle: 360deg; }
}

.subtask-item.edit-mode:active { opacity: 1; }

.subtask-item.editing {
  position: relative;
  border-bottom-color: transparent;
  border-radius: 8px;
  padding: 16px 10px;
  margin: 0 -10px;
  border: 1px solid rgba(212,168,67,0.25);
  background: rgba(212,168,67,0.03);
}

.subtask-inline-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.35;
  outline: none;
  padding: 0;
  caret-color: var(--accent);
}

@media (hover: none) {
  .subtask-del { opacity: 0.7; }
}
</style>
</head>
<body>

<!-- ====== MAIN LIST VIEW ====== -->
<div class="view active" id="viewList">
  <div class="app">
    <div class="header">
      <h1>Home Tasks</h1>
      <div class="stat-pill" id="taskCount"></div>
    </div>

    <div id="weekendSection"></div>
    <div class="section-label" id="allLabel" style="display:none">All Tasks <span></span></div>
    <div class="task-list" id="taskList"></div>
  </div>
  <button class="fab" id="fabAdd" onclick="showForm()">+</button>
</div>

<!-- ====== DETAIL VIEW ====== -->
<div class="view" id="viewDetail">
  <div class="detail-view">
    <div class="detail-nav" id="detailNav"></div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- ====== ADD/EDIT FORM ====== -->
<div class="view" id="viewForm">
  <div class="form-view">
    <div class="detail-nav">
      <button class="back-btn" onclick="cancelForm()">← Cancel</button>
      <div id="formTitle" class="form-title">New Task</div>
      <div style="width:70px"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Task Name</label>
      <input class="form-input" id="fTitle" placeholder="What needs doing?" autocomplete="off">
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="fCatGrid"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Priority</label>
      <div class="priority-options">
        <button class="pri-option low" data-p="low" onclick="setPri('low')">Low</button>
        <button class="pri-option med" data-p="med" onclick="setPri('med')">Med</button>
        <button class="pri-option high" data-p="high" onclick="setPri('high')">High</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">This Weekend?</label>
      <div class="weekend-toggle" onclick="toggleWeekend()">
        <div class="weekend-toggle-label">Add to "This Weekend" list</div>
        <div class="toggle-switch" id="fWeekendToggle"></div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Next Weekend?</label>
      <div class="weekend-toggle" onclick="toggleNextWeekend()">
        <div class="weekend-toggle-label">Add to "Next Weekend" list</div>
        <div class="toggle-switch" id="fNextWeekendToggle"></div>
      </div>
    </div>

    <!-- Subtasks (edit mode only) -->
    <div class="form-group" id="fSubtasksGroup" style="display:none">
      <label class="form-label">Steps</label>
      <div id="fSubtaskList"></div>
      <div class="add-subtask-row">
        <input id="fSubInput" placeholder="Add a step…" onkeydown="if(event.key==='Enter')addFormSub()">
        <button class="add-subtask-btn" onclick="addFormSub()">Add</button>
      </div>
    </div>

    <!-- Notes (edit mode only) -->
    <div class="form-group" id="fNotesGroup" style="display:none">
      <label class="form-label">Notes</label>
      <textarea class="notes-area" id="fNotes" placeholder="Part numbers, measurements, links…"></textarea>
    </div>

    <button class="save-btn" onclick="saveTask()">Save Task</button>

    <!-- Delete (edit mode only) -->
    <button class="del-btn form-delete-btn" id="fDeleteBtn" style="display:none" onclick="confirmDelete()">Delete Task</button>
  </div>
</div>

<!-- ====== DELETE CONFIRM ====== -->
<div class="overlay" id="deleteOverlay">
  <div class="dialog">
    <p>Delete this task and all its subtasks?</p>
    <div class="dialog-actions">
      <button class="dialog-btn dialog-cancel" onclick="closeDelete()">Cancel</button>
      <button class="dialog-btn dialog-confirm" onclick="doDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
const STORE_KEY = 'home-tasks-v1';
const CATEGORIES = [
  'Plumbing','Electrical','HVAC','Yard / Landscaping',
  'Painting / Drywall','Flooring','General Repair','Cleaning / Organization','Insulation'
];

let tasks = [];
let currentTaskId = null;
let stepEditMode = false;

// Form state
let formPri = 'low';
let formCat = '';
let formWeekend = false;
let formNextWeekend = false;
let editId = null;

// ===== STORAGE =====
const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
function isValidUUID(s) { return typeof s === 'string' && UUID_RE.test(s); }

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) tasks = parsed.filter(t => isValidUUID(t.id));
    }
  } catch { tasks = []; }
  render();
}

function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(tasks)); } catch(e) { console.error(e); }
}

// ===== VIEW SWITCHING =====
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showList() {
  stepEditMode = false;
  showView('viewList');
  render();
}

function showDetail(id) {
  currentTaskId = id;
  showView('viewDetail');
  renderDetail();
}

let formSubs = [];

function showForm(id) {
  editId = id || null;
  formPri = 'low'; formCat = ''; formWeekend = false; formNextWeekend = false;
  formSubs = [];
  document.getElementById('fTitle').value = '';
  document.getElementById('fNotes').value = '';

  const isEdit = !!editId;

  if (isEdit) {
    const t = tasks.find(t => t.id === editId);
    if (t) {
      document.getElementById('fTitle').value = t.title;
      formPri = t.priority;
      formCat = t.category;
      formWeekend = t.weekend;
      formNextWeekend = t.nextWeekend || false;
      formSubs = (t.subtasks || []).map(s => ({ ...s }));
      document.getElementById('fNotes').value = t.notes || '';
    }
    document.getElementById('formTitle').textContent = 'Edit Task';
  } else {
    document.getElementById('formTitle').textContent = 'New Task';
  }

  // Show/hide edit-only sections
  document.getElementById('fSubtasksGroup').style.display = isEdit ? 'block' : 'none';
  document.getElementById('fNotesGroup').style.display = isEdit ? 'block' : 'none';
  document.getElementById('fDeleteBtn').style.display = isEdit ? 'block' : 'none';

  renderFormCats();
  renderFormPri();
  renderFormWeekend();
  renderFormNextWeekend();
  if (isEdit) renderFormSubs();
  showView('viewForm');
  setTimeout(() => { if (!editId) document.getElementById('fTitle').focus(); }, 100);
}

function cancelForm() {
  if (editId) {
    showDetail(editId);
  } else {
    showList();
  }
}

function renderFormSubs() {
  document.getElementById('fSubtaskList').innerHTML = formSubs.map((s, i) => `
    <div class="subtask-item" style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;padding:10px 14px;">
      <input class="subtask-edit" value="${esc(s.text)}" onchange="updateFormSub(${i},this.value)"
             style="flex:1;background:transparent;border:none;color:var(--text);font-size:14px;outline:none;">
      <button class="subtask-del" onclick="delFormSub(${i})">✕</button>
    </div>
  `).join('');
}

function addFormSub() {
  const input = document.getElementById('fSubInput');
  const text = input.value.trim();
  if (!text) return;
  formSubs.push({ text, done: false });
  input.value = '';
  renderFormSubs();
}

function delFormSub(idx) {
  formSubs.splice(idx, 1);
  renderFormSubs();
}

function updateFormSub(idx, text) {
  formSubs[idx].text = text;
}

// ===== RENDERING: MAIN LIST =====
function render() {
  renderTaskList();
  const active = tasks.filter(t => !t.done).length;
  document.getElementById('taskCount').innerHTML = `<span>${active}</span> / ${tasks.length}`;
}

function renderTaskList() {
  const weekendTasks = tasks.filter(t => t.weekend && !t.done);
  const nextWeekendTasks = tasks.filter(t => t.nextWeekend && !t.done);
  const otherTasks = tasks.filter(t => !((t.weekend || t.nextWeekend) && !t.done));

  // Sort: incomplete first, then by priority weight, then by creation date
  const priWeight = { high: 0, med: 1, low: 2 };
  const sortFn = (a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (priWeight[a.priority] !== priWeight[b.priority]) return priWeight[a.priority] - priWeight[b.priority];
    return b.created - a.created;
  };
  weekendTasks.sort(sortFn);
  nextWeekendTasks.sort(sortFn);
  otherTasks.sort(sortFn);

  // Weekend section
  const ws = document.getElementById('weekendSection');
  let wsHtml = '';
  if (weekendTasks.length > 0) {
    wsHtml += `
      <div class="section-label">⚡ This Weekend</div>
      <div class="task-list" style="margin-bottom:20px">${weekendTasks.map(cardHtml).join('')}</div>
    `;
  }
  if (nextWeekendTasks.length > 0) {
    wsHtml += `
      <div class="section-label">📅 Next Weekend</div>
      <div class="task-list" style="margin-bottom:20px">${nextWeekendTasks.map(cardHtml).join('')}</div>
    `;
  }
  ws.innerHTML = wsHtml;

  // All tasks label
  const hasWeekendSections = weekendTasks.length > 0 || nextWeekendTasks.length > 0;
  const al = document.getElementById('allLabel');
  al.style.display = (hasWeekendSections && otherTasks.length > 0) ? 'flex' : 'none';
  al.innerHTML = 'Everything Else';
  al.innerHTML += `<span></span>`;
  // Fix: restore the ::after via re-adding class
  al.className = 'section-label';

  // Task list
  const tl = document.getElementById('taskList');
  if (otherTasks.length === 0 && weekendTasks.length === 0 && nextWeekendTasks.length === 0) {
    tl.innerHTML = `<div class="empty"><div class="empty-icon">🏠</div><p>No tasks yet — tap + to add one</p></div>`;
  } else {
    tl.innerHTML = otherTasks.map(cardHtml).join('');
  }
}

function cardHtml(t) {
  const subDone = (t.subtasks || []).filter(s => s.done).length;
  const subTotal = (t.subtasks || []).length;
  const subStr = subTotal > 0 ? `<span class="task-subtask-count"><span>${subDone}</span>/${subTotal}</span>` : '';

  return `
    <div class="task-card ${t.done?'done':''}" style="animation-delay:${Math.random()*50}ms">
      <div class="task-check ${t.done?'checked':''}" onclick="event.stopPropagation();toggleDone('${t.id}')"></div>
      <div class="task-info" onclick="showDetail('${t.id}')">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          <span class="task-cat-badge">${catLabel(t.category || 'Uncategorized','badge')}</span>
          ${subStr}
        </div>
      </div>
      <div class="task-priority-bar ${t.priority}"></div>
    </div>
  `;
}

// ===== RENDERING: DETAIL (Pristine Job View) =====
function renderDetail() {
  const t = tasks.find(t => t.id === currentTaskId);
  if (!t) { showList(); return; }

  const priBadgeClass = t.priority === 'high' ? 'badge-priority-high' : t.priority === 'med' ? 'badge-priority-med' : 'badge-priority-low';

  // Nav bar: Back | Badges | Edit
  document.getElementById('detailNav').innerHTML = `
    <button class="back-btn" onclick="showList()">← Back</button>
    <div class="detail-badges">
      <span class="badge badge-cat">${catLabel(t.category || 'Uncategorized','badge')}</span>
      <span class="badge ${priBadgeClass}">${t.priority.charAt(0).toUpperCase() + t.priority.slice(1)}</span>
      ${t.weekend ? '<span class="badge badge-weekend">⚡ Weekend</span>' : ''}
      ${t.nextWeekend ? '<span class="badge badge-weekend">📅 Next Weekend</span>' : ''}
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="step-edit-btn ${stepEditMode?'active':''}" onclick="toggleStepEdit()">Edit</button>
      <button class="edit-btn" onclick="showForm('${t.id}')" aria-label="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  `;

  // Content: Job title + Steps
  const hasSubtasks = (t.subtasks || []).length > 0;
  const hasNotes = t.notes && t.notes.trim().length > 0;

  document.getElementById('detailContent').innerHTML = `
    <div class="job-title">${esc(t.title)}</div>

    <div class="detail-section">
      <div class="detail-section-label">Steps</div>
      ${hasSubtasks ? `
        <div class="subtask-list">
          ${(t.subtasks || []).map((s, i) => `
            <div class="subtask-item ${s.done?'done':''} ${stepEditMode?'edit-mode':''}" onclick="${stepEditMode ? `startInlineEdit('${t.id}',${i},this)` : `toggleSub('${t.id}',${i})`}" data-sub-idx="${i}">
              <div class="subtask-check ${s.done?'checked':''}"></div>
              <span class="subtask-text">${esc(s.text)}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
      <div class="add-subtask-row">
        <input id="detailSubInput" placeholder="Add a step…" onkeydown="if(event.key==='Enter')addDetailSub('${t.id}')">
        <button class="add-subtask-btn" onclick="addDetailSub('${t.id}')">+</button>
      </div>
    </div>

    ${hasNotes ? `
      <div class="detail-section">
        <div class="detail-section-label">Notes</div>
        <div class="notes-readonly">${esc(t.notes)}</div>
      </div>
    ` : ''}

    <button class="mark-done-btn" onclick="toggleDone('${t.id}');renderDetail()">
      ${t.done ? '↩ Mark Active' : '✓ Mark Done'}
    </button>
  `;
}

// ===== ACTIONS =====
function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function addDetailSub(tid) {
  const input = document.getElementById('detailSubInput');
  const text = input.value.trim();
  if (!text) return;
  const t = tasks.find(t => t.id === tid);
  if (t) {
    if (!t.subtasks) t.subtasks = [];
    t.subtasks.push({ text, done: false });
    save();
    renderDetail();
    setTimeout(() => document.getElementById('detailSubInput').focus(), 50);
  }
}

function toggleSub(tid, idx) {
  const t = tasks.find(t => t.id === tid);
  if (t && t.subtasks[idx]) {
    t.subtasks[idx].done = !t.subtasks[idx].done;
    // If all subtasks done, mark parent done
    const allDone = t.subtasks.every(s => s.done);
    if (allDone && t.subtasks.length > 0) t.done = true;
    save();
    renderDetail();
  }
}

function toggleStepEdit() {
  stepEditMode = !stepEditMode;
  renderDetail();
}

function startInlineEdit(tid, idx, el) {
  if (el.querySelector('.subtask-inline-input')) return;
  const t = tasks.find(t => t.id === tid);
  if (!t || !t.subtasks[idx]) return;
  const span = el.querySelector('.subtask-text');
  const original = t.subtasks[idx].text;
  const input = document.createElement('input');
  input.className = 'subtask-inline-input';
  input.value = original;
  span.replaceWith(input);
  el.classList.remove('edit-mode');
  el.classList.add('editing');
  input.focus();

  let committed = false;
  function commitEdit() {
    if (committed) return;
    committed = true;
    const val = input.value.trim();
    if (val && val !== original) {
      t.subtasks[idx].text = val;
      save();
    }
    stepEditMode = false;
    renderDetail();
  }
  function cancelEdit() {
    if (committed) return;
    committed = true;
    stepEditMode = false;
    renderDetail();
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); commitEdit(); }
    if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
  });
  input.addEventListener('blur', commitEdit);
  el.onclick = null;
}

function confirmDelete() {
  document.getElementById('deleteOverlay').classList.add('show');
}
function closeDelete() {
  document.getElementById('deleteOverlay').classList.remove('show');
}
function doDelete() {
  tasks = tasks.filter(t => t.id !== editId);
  save();
  closeDelete();
  showList();
}

// ===== FORM =====
function renderFormCats() {
  document.getElementById('fCatGrid').innerHTML = CATEGORIES.map(c =>
    `<button class="cat-option ${formCat===c?'selected':''}" onclick="setFormCat('${c.replace(/'/g,"\\'")}')">${catLabel(c,'form')}</button>`
  ).join('');
}
function setFormCat(c) {
  formCat = c;
  renderFormCats();
}

function renderFormPri() {
  document.querySelectorAll('.pri-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.p === formPri);
  });
}
function setPri(p) {
  formPri = p;
  renderFormPri();
}

function renderFormWeekend() {
  document.getElementById('fWeekendToggle').classList.toggle('on', formWeekend);
}
function toggleWeekend() {
  formWeekend = !formWeekend;
  renderFormWeekend();
}

function renderFormNextWeekend() {
  document.getElementById('fNextWeekendToggle').classList.toggle('on', formNextWeekend);
}
function toggleNextWeekend() {
  formNextWeekend = !formNextWeekend;
  renderFormNextWeekend();
}

function saveTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }

  if (editId) {
    const t = tasks.find(t => t.id === editId);
    if (t) {
      t.title = title;
      t.category = formCat || 'General Repair';
      t.priority = formPri;
      t.weekend = formWeekend;
      t.nextWeekend = formNextWeekend;
      t.subtasks = formSubs;
      t.notes = document.getElementById('fNotes').value;
    }
    save();
    showDetail(editId);
  } else {
    const newId = crypto.randomUUID();
    tasks.unshift({
      id: newId,
      title,
      category: formCat || 'General Repair',
      priority: formPri,
      weekend: formWeekend,
      nextWeekend: formNextWeekend,
      done: false,
      subtasks: [],
      notes: '',
      created: Date.now()
    });
    save();
    showList();
  }
}

// ===== UTILS =====
const INSULATION_ICON = '<svg viewBox="0 0 24 24" width="20" height="14" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle"><rect x="3" y="4" width="18" height="3.5" rx="1.5" fill="currentColor" opacity="0.9"/><rect x="3" y="10.25" width="18" height="3.5" rx="1.5" fill="currentColor" opacity="0.55"/><rect x="3" y="16.5" width="18" height="3.5" rx="1.5" fill="currentColor" opacity="0.25"/></svg>';
function catLabel(c, mode) {
  if (c !== 'Insulation') return mode === 'form' ? c : esc(c);
  return mode === 'form' ? INSULATION_ICON + ' Insulation' : INSULATION_ICON + ' Insul.';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ===== INIT =====
load();
</script>
</body>
</html>
